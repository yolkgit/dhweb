version: "3.8"

services:
  # Backend Server
  server:
    build:
      context: ./server
    ports:
      - "3005:3004"
    volumes:
      - ./server/uploads:/app/uploads
    restart: always

  # Frontend Client
  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3004:80"
    depends_on:
      - server
    restart: always
